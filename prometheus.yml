global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'servly-monitor'
    application: 'Servly Backend'
    environment: 'development'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Servly Backend Metrics (en Docker, usa el nombre del contenedor)
  - job_name: 'servly-backend'
    static_configs:
      - targets: ['servly-app:8081']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s
    scrape_timeout: 10s

  # Prometheus Self-Monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 15s
    scrape_timeout: 10s

