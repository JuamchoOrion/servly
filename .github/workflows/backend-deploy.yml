name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  SERVICE_NAME: servly-backend
  REPOSITORY: servly-images
  IMAGE_NAME: backend
  WORKLOAD_IDENTITY_POOL: ${{ secrets.GCP_WORKLOAD_IDENTITY_POOL }}
  SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Cloud Auth
        uses: 'google-github-actions/auth@v2'
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_POOL }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          LATEST_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest"
          docker build -t "$IMAGE_TAG" -t "$LATEST_TAG" .
          docker push "$IMAGE_TAG"
          docker push "$LATEST_TAG"
          echo "IMAGE_URL=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        id: deploy
        uses: 'google-github-actions/deploy-cloudrun@v2.1.0'
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_URL }}
          timeout: 600
          # ✅ Parámetros via flags (sintaxis Linux: una sola línea, sin ^)
          flags: "--allow-unauthenticated --memory=512Mi --cpu=1 --min-instances=0 --max-instances=3"
          # ✅ Variables de entorno (SIN PORT, Cloud Run lo pone automático)
          env_vars: SPRING_PROFILES_ACTIVE=production,SPRING_DATASOURCE_URL=jdbc:postgresql://aws-1-sa-east-1.pooler.supabase.com:5432/postgres?sslmode=require,SPRING_DATASOURCE_USERNAME=postgres.wglrjiiljnzemxrczwmy,SPRING_DATASOURCE_PASSWORD=${{ secrets.SUPABASE_DB_PASSWORD }},APP_JWT_SECRET=${{ secrets.JWT_SECRET }},APP_JWT_EXPIRATION=86400000,APP_JWT_REFRESH_EXPIRATION=259200000
      - name: Show URL
        run: |
          echo "✅ Deployed: ${{ steps.deploy.outputs.url }}"